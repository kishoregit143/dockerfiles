apiVersion: eksctl.io/v1alpha5     # FIXED: apiVersion spelling
kind: ClusterConfig

metadata:
  name: roboshop-dev
  region: us-east-1

managedNodeGroups:
  - name: roboshop-dev
    instanceTypes: ["m5.large", "t3.small", "t3.medium", "c5.large"]   # FIXED: instanceTypes (plural)
    desiredCapacity: 2
    spot: true